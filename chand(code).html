    case 'library':

      <rect x="55" y="95" width="290" height="125" fill="${c}"/><g fill="#fff">${columns(75,100,250,110,8)}</g>
      <polygon points="40,95 200,45 360,95" fill="${shade(c,20)}"/>

    case 'dome':

      <rect x="70" y="120" width="260" height="100" fill="${c}"/>

function shade(hex, pct){
  let c = hex.replace('#','');
  let num = parseInt(c,16);
  let r=(num>>16)+pct, g=((num>>8)&0x00FF)+pct, b=(num&0x0000FF)+pct;
  r=Math.max(Math.min(255,r),0); g=Math.max(Math.min(255,g),0); b=Math.max(Math.min(255,b),0);
  return '#'+(0x1000000+r*0x10000+g*0x100+b).toString(16).slice(1);
}
function gridRects(x,y,w,h,gap,cols,rowGap,rows){
  let s=''; const rr = rows||1;
  for(let r=0;r< (rr? Math.max(1,Math.round(rr/rowGap)) : 3); r++){
    for(let ccol=0; ccol<cols; ccol++){
      s += `<rect x="${x+ccol*(w+gap)}" y="${y+r*(h+ (rowGap||h+gap))}" width="${w}" height="${h}"/>`;
    }
  }
  return s;
}
function columns(x,y,totalW,h,count){
  let s=''; const w= totalW/count*0.4; const gap=(totalW-count*w)/(count-1);
  for(let i=0;i<count;i++){ s+= `<rect x="${x+i*(w+gap)}" y="${y}" width="${w}" height="${h}"/>`; }
  return s;
}

function showToast(msg, type='ok'){
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast' + (type==='error' ? ' error':'');
  el.innerHTML = `<i class="fa-solid ${type==='error'?'fa-circle-exclamation':'fa-circle-check'}"></i><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(()=>{ el.classList.add('hide'); setTimeout(()=>el.remove(),300); }, 2800);
}

const DEPT_IDS = ['cse','aiml','ece','it','civil','mech'];
function renderDepartments(filter='all'){
  const grid = document.getElementById('deptGrid');
  const list = DEPT_IDS.map(id=>locById[id]).filter(l=> filter==='all' || l.group===filter);
  if(!list.length){ grid.innerHTML = `<div class="no-results"><i class="fa-solid fa-folder-open"></i><p>No departments match this filter.</p></div>`; return; }
  grid.innerHTML = list.map(l=>`
    <div class="dept-card">
      <div class="dept-img">${buildingSVG(l.illo, l.color)}<span class="dept-tag">${l.building}</span></div>
      <div class="dept-body">
        <h3>${l.name}</h3>
        <p class="dept-desc">${l.desc}</p>
        <div class="dept-meta">
          <span><i class="fa-solid fa-layer-group"></i> ${l.floor}</span>
          <span><i class="fa-regular fa-clock"></i> ${l.timing}</span>
        </div>
        <div class="dept-footer">
          <button class="btn btn-primary btn-sm btn-block" onclick="viewOnMap('${l.id}')"><i class="fa-solid fa-map-pin"></i> View on Map</button>
        </div>
      </div>
    </div>`).join('');
}

let statsAnimated = false;
function animateStats(){
  if(statsAnimated) return;
  const bar = document.getElementById('statsBar');
  const r = bar.getBoundingClientRect();
  if(r.top > window.innerHeight - 100) return;
  statsAnimated = true;
  document.querySelectorAll('.stat-num').forEach(el=>{
    const target = parseInt(el.dataset.target);
    const suffix = el.dataset.suffix || '';
    let cur = 0; const step = Math.max(1, Math.ceil(target/60));
    const t = setInterval(()=>{
      cur += step;
      if(cur >= target){ cur = target; clearInterval(t); }
      el.textContent = cur.toLocaleString() + suffix;
    }, 25);
  });
}
window.addEventListener('scroll', animateStats);

function doSearch(q){
  q = q.trim().toLowerCase();
  if(!q){ searchResults.classList.remove('show'); return; }
  const matches = LOCATIONS.filter(l => l.name.toLowerCase().includes(q) || l.building.toLowerCase().includes(q));
  if(!matches.length){
    searchResults.innerHTML = `<div class="search-empty">No matches for "${q}"</div>`;

      <div class="search-result-item" onclick="selectSearchResult('${l.id}')">

        <i class="fa-solid fa-location-arrow" style="color:var(--primary)"></i>

/* ============================= LEAFLET MAP (CRS.Simple + custom illustrated map) ============================= */
const MAP_W = 950, MAP_H = 700;
function buildMapSVG(){
  // Build one big illustrated "real hypothetical" campus map as SVG, encoded for Leaflet imageOverlay
  let roads = EDGES.map(([a,b])=>{
    const A = locById[a], B = locById[b];
    return `<line x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>`;
  }).join('');
  let roadLines = EDGES.map(([a,b])=>{
    const A = locById[a], B = locById[b];
    return `<line x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}" stroke="#c7d2e0" stroke-width="10" stroke-dasharray="2 10" stroke-linecap="round"/>`;
  }).join('');
  let buildings = LOCATIONS.map(l=>{
    if(l.category==='entry') return '';
    const w=54,h=40;
    return `<rect x="${l.x-w/2}" y="${l.y-h/2}" width="${w}" height="${h}" rx="8" fill="${l.color}" opacity="0.16" stroke="${l.color}" stroke-width="2"/>`;
  }).join('');
  let trees = [[70,120],[880,150],[820,470],[60,470],[380,60],[900,600],[40,610],[600,650],[750,120],[120,320]]
    .map(([x,y])=>`<circle cx="${x}" cy="${y}" r="16" fill="#8FBF97" opacity="0.7"/>`).join('');
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${MAP_W}" height="${MAP_H}" viewBox="0 0 ${MAP_W} ${MAP_H}">
    <rect width="${MAP_W}" height="${MAP_H}" fill="#e7f0e4"/>
    <rect x="0" y="0" width="${MAP_W}" height="${MAP_H}" fill="#dce8f2" opacity="0.4"/>
    ${trees}
    ${roads}
    ${roadLines}
    ${buildings}
    <rect x="700" y="540" width="120" height="80" fill="#cbd5c9" opacity="0.5" rx="4"/>
    <text x="20" y="30" font-family="Poppins,sans-serif" font-size="20" font-weight="700" fill="#0B1530" opacity="0.35">AMI UNIVERSITY CAMPUS</text>
  </svg>`;
}
const mapSVGData = 'data:image/svg+xml;base64,' + btoa(buildMapSVG());

const map = L.map('campusMap', { crs: L.CRS.Simple, minZoom:-1, maxZoom:2, zoomControl:false, attributionControl:false });
const bounds = [[0,0],[MAP_H, MAP_W]];
L.imageOverlay(mapSVGData, bounds).addTo(map);
map.fitBounds(bounds);
map.setMaxBounds([[-80,-80],[MAP_H+80, MAP_W+80]]);

function toLatLng(x,y){ return [MAP_H - y, x]; } // flip y for CRS.Simple

const markers = {};
LOCATIONS.forEach(l=>{
  const icon = L.divIcon({
    className:'',
    html:`<div style="width:34px;height:34px;border-radius:50% 50% 50% 0;background:${l.color};transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,0.35);border:2px solid #fff;">
      <i class="fa-solid ${l.icon}" style="transform:rotate(45deg);color:#fff;font-size:13px;"></i></div>`,
    iconSize:[34,34], iconAnchor:[17,32], popupAnchor:[0,-30]
  });
  const marker = L.marker(toLatLng(l.x,l.y), {icon}).addTo(map);
  marker.bindPopup(buildPopup(l), {closeButton:true});
  markers[l.id] = marker;
});

function buildPopup(l){
  return `<div class="map-popup">${buildingSVG(l.illo,l.color)}
    <div class="popup-body">
      <span class="popup-tag">${l.building}</span>
      <h4>${l.name}</h4>
      <div class="popup-meta">
        <span><i class="fa-regular fa-clock"></i> ${l.timing}</span>
        <span><i class="fa-solid fa-layer-group"></i> Floor: ${l.floor}</span>
        <span><i class="fa-solid fa-phone"></i> ${l.phone}</span>
      </div>
      <p class="popup-desc">${l.desc}</p>

    </div></div>`;
}

function viewOnMap(id){

/* ============================= ROUTE FINDER (Dijkstra + animation) ============================= */
const graph = {};
LOCATIONS.forEach(l=> graph[l.id] = []);
EDGES.forEach(([a,b,d])=>{ graph[a].push({to:b,d}); graph[b].push({to:a,d}); });

function dijkstra(start,end){
  const dist = {}, prev = {}, visited = new Set();
  LOCATIONS.forEach(l=> dist[l.id]=Infinity);
  dist[start]=0;
  const pq = [[0,start]];
  while(pq.length){
    pq.sort((a,b)=>a[0]-b[0]);
    const [d,u] = pq.shift();
    if(visited.has(u)) continue;
    visited.add(u);
    if(u===end) break;
    graph[u].forEach(edge=>{
      const nd = d + edge.d;
      if(nd < dist[edge.to]){ dist[edge.to]=nd; prev[edge.to]=u; pq.push([nd, edge.to]); }
    });
  }
  if(dist[end]===Infinity) return null;
  const path=[end]; let cur=end;
  while(cur!==start){ cur=prev[cur]; path.unshift(cur); }
  return {path, distance:dist[end]};
}

function turnDirection(p1,p2,p3){
  const v1x=p2.x-p1.x, v1y=p2.y-p1.y, v2x=p3.x-p2.x, v2y=p3.y-p2.y;
  const cross = v1x*v2y - v1y*v2x;
  const dot = v1x*v2x+v1y*v2y;
  const angle = Math.atan2(cross,dot) * 180/Math.PI;
  if(Math.abs(angle) < 25) return 'straight';
  return angle > 0 ? 'right' : 'left';
}

let routeLine = null, routeDot = null, routeAnimId = null;

function findRoute(){
  const startId = document.getElementById('startSelect').value;
  const endId = document.getElementById('endSelect').value;
  const resultBox = document.getElementById('routeResult');
  if(startId===endId){ showToast('Start and destination are the same','error'); return; }
  const result = dijkstra(startId,endId);
  if(!result){ resultBox.innerHTML = `<div class="route-placeholder"><i class="fa-solid fa-circle-exclamation"></i> No path found.</div>`; return; }
  const {path, distance} = result;
  const meters = Math.round(distance);
  const minutes = Math.max(1, Math.round(meters/80));

  // Steps
  let steps = [`Start at ${locById[path[0]].name}`];
  for(let i=1;i<path.length-1;i++){
    const dir = turnDirection(locById[path[i-1]], locById[path[i]], locById[path[i+1]]);
    const label = dir==='straight' ? `Continue straight past ${locById[path[i]].name}` : `Turn ${dir} at ${locById[path[i]].name}`;
    steps.push(label);
  }
  steps.push(`Arrive at ${locById[path[path.length-1]].name}`);

  resultBox.innerHTML = `
    <div class="route-stats">
      <div class="rs-box"><div class="rs-val">${meters} m</div><div class="rs-lbl">Distance</div></div>
      <div class="rs-box"><div class="rs-val">${minutes} min</div><div class="rs-lbl">Walking Time</div></div>
      <div class="rs-box"><div class="rs-val">${path.length}</div><div class="rs-lbl">Waypoints</div></div>
    </div>
    <div class="steps">${steps.map((s,i)=>`<div class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}</div>`;

  drawRouteOnMap(path);
  document.getElementById('map').scrollIntoView({behavior:'smooth'});
  showToast('Route found — animating on map');
}

function drawRouteOnMap(path){
  if(routeLine) map.removeLayer(routeLine);
  if(routeDot) map.removeLayer(routeDot);
  if(routeAnimId) cancelAnimationFrame(routeAnimId);

  const latlngs = path.map(id=> toLatLng(locById[id].x, locById[id].y));
  routeLine = L.polyline(latlngs, {color:'#1E40AF', weight:6, opacity:0.85, dashArray:'1,12', lineCap:'round'}).addTo(map);

  const dotIcon = L.divIcon({className:'', html:`<div style="width:16px;height:16px;border-radius:50%;background:#F2B84B;border:3px solid #1E40AF;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>`, iconSize:[16,16], iconAnchor:[8,8]});
  routeDot = L.marker(latlngs[0], {icon:dotIcon}).addTo(map);

  map.fitBounds(routeLine.getBounds(), {padding:[60,60]});

  // animate dot along polyline
  let segIndex = 0, t = 0;
  const speed = 0.012;
  function animate(){
    if(segIndex >= latlngs.length-1){ segIndex=0; t=0; }
    const p1 = latlngs[segIndex], p2 = latlngs[segIndex+1];
    t += speed;
    if(t >= 1){ t = 0; segIndex++; if(segIndex >= latlngs.length-1) segIndex=0; }
    const lat = p1[0] + (p2[0]-p1[0])*t;
    const lng = p1[1] + (p2[1]-p1[1])*t;
    routeDot.setLatLng([lat,lng]);
    routeAnimId = requestAnimationFrame(animate);
  }
  animate();
}

  const startSel = document.getElementById('startSelect');

  startSel.innerHTML = opts;

  startSel.value = 'gate';
  endSel.value = 'library';
}

const aiFab = document.getElementById('aiFab');
const chatPanel = document.getElementById('chatPanel');
const chatBody = document.getElementById('chatBody');
aiFab.addEventListener('click', ()=> chatPanel.classList.toggle('open'));
document.getElementById('chatClose').addEventListener('click', ()=> chatPanel.classList.remove('open'));

function addChatMsg(text, who){
  const div = document.createElement('div');
  div.className = 'chat-msg ' + who;
  div.textContent = text;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}
function aiRespond(q){
  const lower = q.toLowerCase();
  const found = LOCATIONS.find(l=> lower.includes(l.name.toLowerCase()) || lower.includes(l.id) || (l.name.toLowerCase().split(' ').some(w=> w.length>3 && lower.includes(w))));
  if(lower.includes('cafeteria') || lower.includes('food')){
    const l = locById['cafeteria'];
    addChatMsg(`${l.name} is at ${l.building}, open ${l.timing}. I'll show it on the map.`,'bot');
    viewOnMap('cafeteria'); return;
  }
  if(found){
    addChatMsg(`${found.name} is located at ${found.building} (Floor: ${found.floor}), open ${found.timing}. Showing it on the map now.`, 'bot');
    viewOnMap(found.id); return;
  }
  addChatMsg("I couldn't find that exact place. Try asking about CSE, Library, Hostel, Auditorium, Cafeteria, or Sports Complex.", 'bot');
}
document.getElementById('chatSend').addEventListener('click', ()=>{
  const input = document.getElementById('chatInput');
  const val = input.value.trim(); if(!val) return;
  addChatMsg(val,'user'); input.value='';
  setTimeout(()=> aiRespond(val), 400);
});
document.getElementById('chatInput').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('chatSend').click(); });
document.querySelectorAll('.cq-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{ addChatMsg(btn.dataset.q,'user'); setTimeout(()=> aiRespond(btn.dataset.q),400); });
});
